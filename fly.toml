# fly.toml — Fly.io deployment config for GuardRail-as-a-Service
#
# STATUS: not deployed. This file is a ready-to-use config, not a description of
# a running service — there is no live guardrail-service.fly.dev endpoint.
#
# Before deploying:
#   1. `app` below must be globally unique on Fly; "guardrail-service" is likely
#      taken, so pick another name.
#   2. Run `python -m pipeline.tier2_classifier --download` first. models/ is
#      gitignored, so a fresh clone has no Tier 2 model and would deploy with the
#      classifier failing open (Tier 1 only).
#   3. Fly has no free tier; a 2 GB shared-cpu machine incurs monthly cost.
#
# Deploy with: fly deploy

app = "guardrail-service"
primary_region = "fra"       # Frankfurt — closest to CISPA/TU Delft reviewers

[build]
  dockerfile = "Dockerfile"

[env]
  LOG_LEVEL = "info"

[http_service]
  internal_port = 8100
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0      # free tier: scales to zero

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  # Measured: the container holds ~1.2 GiB resident once the DeBERTa-v3 ONNX
  # session, tokenizer and the transformers/onnxruntime stack are loaded.
  # 512 MB (the previous value) OOMs during Tier 2 warm-up.
  memory_mb = 2048

[checks]
  [checks.health]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    path = "/health"
    port = 8100
    timeout = "5s"
    type = "http"
